provider:
  name: pihole

sources:
  - ingress
  - service

policy: upsert-only
registry: noop
logLevel: info
interval: 1m

domainFilters:
  - home

extraArgs:
  pihole-server: http://pihole-web.pihole-system.svc.cluster.local
  pihole-api-version: "6"

env:
  - name: EXTERNAL_DNS_PIHOLE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: pihole-password
        key: EXTERNAL_DNS_PIHOLE_PASSWORD

ingressClassFilters:
  - traefik
