templates:
  default:
    values:
      - values/{{`{{ .Release.Name }}`}}.values.yaml
    createNamespace: true
    missingFileHandler: Warn

repositories:
  - name: longhorn
    url: https://charts.longhorn.io

releases:
  - name: longhorn
    inherit:
      - template: default
    namespace: longhorn-system
    chart: longhorn/longhorn
    version: 1.11.1
